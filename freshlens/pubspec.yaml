name: freshlens
description: Food freshness classifier — on-device ML with cloud fallback
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # ML
  tflite_flutter: ^0.10.4
  image: ^4.1.3

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  permission_handler: ^11.3.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Notifications
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.5.2

  # Utilities
  connectivity_plus: ^6.0.1
  fpdart: ^1.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.2.0
  cached_network_image: ^3.3.1
  share_plus: ^7.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  drift_dev: ^2.14.1
  retrofit_generator: ^8.1.0
  flutter_lints: ^3.0.1
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
